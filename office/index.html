<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مساحة عمل الموظف</title>
    <link rel="stylesheet" href="/platform.css" />
  </head>
  <body>
    <div class="uae-strip" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
    <header class="site-header">
      <div class="brand-row">
        <div class="emblem" aria-hidden="true" data-copy="brandMark"></div>
        <div>
          <strong data-copy="country"></strong>
          <span data-copy="ministry"></span>
        </div>
      </div>
      <button id="languageToggle" class="language-button" type="button" data-copy="toggle"></button>
    </header>
    <main>
      <div class="wayfinding">
        <a href="/" data-lang-link data-copy="platformHome"></a>
      </div>
      <section class="hero">
        <p class="kicker" data-copy="officePortal"></p>
        <h1 data-copy="officeCatalogueTitle"></h1>
        <p data-copy="catalogueText"></p>
      </section>
      <section class="card-grid">
        <article class="service-card">
          <span class="status" data-copy="ready"></span>
          <h3 data-copy="housingTitle"></h3>
          <p data-copy="housingText"></p>
          <a class="primary-link" href="/office/housing-arrears/" data-lang-link data-copy="open"></a>
        </article>
        <article class="service-card">
          <span class="status" data-copy="ready"></span>
          <h3 data-copy="omniTitle"></h3>
          <p data-copy="omniText"></p>
          <a class="primary-link" href="/office/omnichannel-intake/" data-lang-link data-copy="open"></a>
        </article>
        <article class="service-card">
          <span class="status" data-copy="ready"></span>
          <h3 data-copy="leadershipTitle"></h3>
          <p data-copy="leadershipText"></p>
          <a class="primary-link" href="/leadership/dashboard/" data-lang-link data-copy="open"></a>
        </article>
      </section>
    </main>
    <script src="/platform.js"></script>
  </body>
</html>
