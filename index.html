<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة عمليات الخدمات</title>
    <link rel="stylesheet" href="/platform.css" />
  </head>
  <body>
    <div class="uae-strip" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
    <header class="site-header">
      <div class="brand-row">
        <div class="emblem" aria-hidden="true" data-copy="brandMark"></div>
        <div>
          <strong data-copy="country"></strong>
          <span data-copy="ministry"></span>
        </div>
      </div>
      <button id="languageToggle" class="language-button" type="button" data-copy="toggle"></button>
    </header>
    <main>
      <section class="trustgate-callout" aria-label="TrustGate identity layer">
        <div>
          <strong data-copy="trustgateTitle"></strong>
          <span data-copy="trustgateText"></span>
        </div>
        <a class="outline-link" href="https://trustgate.sahlabs.me" target="_blank" rel="noopener" data-copy="openTrustGate"></a>
      </section>
      <section class="hero">
        <p class="kicker" data-copy="platform"></p>
        <h1 data-copy="gatewayTitle"></h1>
        <p data-copy="gatewayText"></p>
        <div class="hero-actions">
          <a class="primary-link" href="https://trustgate.sahlabs.me" target="_blank" rel="noopener" data-copy="openTrustGate"></a>
          <a class="primary-link" href="/customer/" data-lang-link data-copy="openCustomer"></a>
          <a class="outline-link" href="/office/" data-lang-link data-copy="openOffice"></a>
          <a class="outline-link" href="/verify/" data-lang-link data-copy="openVerify"></a>
          <a class="outline-link" href="/challenge-2/intelligence/" data-lang-link data-copy="openCountryIQ"></a>
          <a class="outline-link" href="/ddahub/" data-lang-link data-copy="openDdaHub"></a>
        </div>
      </section>
      <section class="card-grid">
        <article class="service-card">
          <span class="status" data-copy="ready"></span>
          <h3 data-copy="customerPortal"></h3>
          <p data-copy="customerText"></p>
          <a class="primary-link" href="/customer/" data-lang-link data-copy="openCustomer"></a>
        </article>
        <article class="service-card">
          <span class="status" data-copy="ready"></span>
          <h3 data-copy="officePortal"></h3>
          <p data-copy="officeText"></p>
          <a class="primary-link" href="/office/" data-lang-link data-copy="openOffice"></a>
        </article>
        <article class="service-card">
          <span class="status" data-copy="ready"></span>
          <h3 data-copy="verifyPortal"></h3>
          <p data-copy="verifyText"></p>
          <a class="primary-link" href="/verify/" data-lang-link data-copy="openVerify"></a>
        </article>
        <article class="service-card">
          <span class="status" data-copy="ready"></span>
          <h3 data-copy="countryTitle"></h3>
          <p data-copy="countryText"></p>
          <a class="primary-link" href="/challenge-2/intelligence/" data-lang-link data-copy="openCountryIQ"></a>
        </article>
        <article class="service-card">
          <span class="status" data-copy="ready"></span>
          <h3 data-copy="ddaHubTitle"></h3>
          <p data-copy="ddaHubText"></p>
          <a class="primary-link" href="/ddahub/" data-lang-link data-copy="openDdaHub"></a>
        </article>
      </section>
    </main>
    <script src="/platform.js"></script>
  </body>
</html>
